seed: 42

project:
  name: chakra
  group: hndsr-vR
  tags:
    - phase1
    - scratch

runtime:
  version: vR.1
  lineage: scratch
  parent: null

paths:
  artifact_root: artifacts
  report_root: reports
  datasets:
    kaggle_4x:
      hr_dir: data/kaggle_4x/HR   # Override in configs/hndsr_vr/local.yaml
      lr_dir: data/kaggle_4x/LR   # Override in configs/hndsr_vr/local.yaml

dataset:
  family: kaggle
  name: kaggle_4x
  pairing_mode: paired
  scale_factor: 4

data:
  patch_size: 64
  batch_size: 4
  num_workers: 0
  val_split: 0.1
  fixed_scale: 4
  train_limit: null
  val_limit: 8

tracking:
  enabled: true
  mode: online
  project: chakra
  entity: null
  notes: HNDSR scratch research lane

model:
  kind: sr3
  model_channels: 32

training:
  epochs: 6
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  max_train_batches: null
  max_val_batches: 8
  checkpoint_name: vR.1_train_best.pt

diffusion:
  num_timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 0.02
  inference_steps: 10

evaluation:
  sample_limit: 8
  save_limit: 8
  compute_lpips: true
  grid_name: vR.1_grid.png
